// ── Render list ──────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('amb-list');
  el.innerHTML = AMBASSADORS.map((a,i) => `
    <div class="amb-item" id="amb-item-${i}">
      <div class="amb-avatar" style="background:${a.color}">${a.initials}</div>
      <div style="flex:1">

        <div class="amb-meta">${a.college} · ${a.course} · ${a.activityStatus}</div>
      </div>

      <span class="amb-status status-waiting" id="status-${i}">Waiting</span>
    </div>
  `).join('');
}

// ── Seeder ───────────────────────────────────────────────────────
async function seedAll() {
  const btn = document.getElementById('seed-btn');
  const log = document.getElementById('log');
  const bar = document.getElementById('progress-bar');
  const barWrap = document.getElementById('progress-bar-wrap');
  const summary = document.getElementById('summary');

  btn.disabled = true;
  btn.textContent = '⏳ Uploading…';
  log.style.display = 'block';
  barWrap.style.display = 'block';
  summary.style.display = 'none';
  log.innerHTML = '';

  // Wait for Firebase to be ready
  let attempts = 0;
  while (!window.__db && attempts < 30) {
    await new Promise(r => setTimeout(r, 200));
    attempts++;
  }

  if (!window.__db) {
    logLine('❌ Firebase not ready. Please refresh and try again.', 'err');
    btn.disabled = false;
    btn.textContent = '🔄 Retry';
    return;
  }

  logLine('✅ Firebase ready — starting upload…', 'ok');

  let ok = 0, failed = 0;

  for (let i = 0; i < AMBASSADORS.length; i++) {
    const a = AMBASSADORS[i];
    const itemEl   = document.getElementById(`amb-item-${i}`);
    const statusEl = document.getElementById(`status-${i}`);
    statusEl.textContent = '⏳ Uploading…';
    statusEl.className = 'amb-status status-uploading';

    try {
      // Use refCode as document ID so it's idempotent
      const docRef = window.__fsDoc(
        window.__fsCollection(window.__db, 'ambassadors'),
        a.refCode
      );
      await window.__fsSetDoc(docRef, {
        ...a,
        uid: a.refCode, // synthetic UID using refCode
        createdAt: window.__fsTimestamp(),
        updatedAt: window.__fsTimestamp(),
        seededAt: new Date().toISOString(),
      }, { merge: true }); // merge=true allows re-running without overwriting custom fields

      statusEl.textContent = '✅ Done';
      statusEl.className = 'amb-status status-done';
      itemEl.classList.add('uploaded');
      logLine(`✅ ${a.name} (${a.refCode}) uploaded`, 'ok');
      ok++;
    } catch (err) {
      statusEl.textContent = '❌ Failed';
      statusEl.className = 'amb-status status-error';
      itemEl.classList.add('error');
      logLine(`❌ ${a.name}: ${err.message}`, 'err');
      failed++;
    }

    // Update progress bar
    bar.style.width = ((i + 1) / AMBASSADORS.length * 100) + '%';
    await new Promise(r => setTimeout(r, 150)); // small delay for visual effect
  }

  logLine(`\n🏁 Done: ${ok} uploaded, ${failed} failed`, ok > 0 ? 'ok' : 'err');

  summary.style.display = 'block';
  if (failed === 0) {
    summary.className = 'summary success';
    summary.innerHTML = `
      <strong>🎉 All ${ok} ambassadors uploaded successfully!</strong><br>
      They are now live in your Firebase Firestore <code>ambassadors</code> collection.<br>
      The student enrollment form will auto-load these codes for referral code validation.
    `;
    btn.textContent = '✅ Upload Complete';
    btn.className = 'btn btn-green';
    btn.disabled = false;
    btn.onclick = () => location.reload();
  } else {
    summary.className = 'summary partial';
    summary.innerHTML = `
      <strong>⚠️ ${ok} uploaded, ${failed} failed.</strong><br>
      Check the log above for details. Make sure Firebase Firestore rules allow writes and try again.
    `;
    btn.textContent = '🔄 Retry Failed';
    btn.disabled = false;
    btn.onclick = () => location.reload();
  }
}

function logLine(msg, type) {
  const log = document.getElementById('log');
  const span = document.createElement('span');
  span.className = `log-${type}`;
  span.textContent = msg + '\n';
  log.appendChild(span);
  log.scrollTop = log.scrollHeight;
}

window.seedAll = seedAll;
