[build]
  publish = "."

[[redirects]]
  from = "/admin"
  to = "/hushhambassify.html"
  status = 200

[[redirects]]
  from = "/portal"
  to = "/ambassador-portal.html"
  status = 200

[[redirects]]
  from = "/enroll"
  to = "/student-enrollment.html"
  status = 200

[[redirects]]
  from = "/join"
  to = "/student-enrollment.html"
  status = 200

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
